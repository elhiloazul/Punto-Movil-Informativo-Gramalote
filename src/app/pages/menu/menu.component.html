<main class="main" [style.background-image]="'url(https://elhiloazul.com/wp-content/uploads/2026/03/animal-2.gif)'"
  [style.height]="'100vh'" [style.background-size]="'cover'" [style.background-position]="'center'">
  <img src="images/tico/Tico-Derecha.gif" alt="" class="bg-img">

  <div class="content">
    @for (activity of menuActivities(); track activity.id) {
      <button class="pill" [class]="'pill activity-' + activity.id" [routerLink]="['/activity', activity.id]">
        {{ activity.name }}
      </button>
    }
    <app-footer></app-footer>
  </div>
</main>
