<div class="screen">

    <div class="document-container">
        <embed 
        [src]="pdfUrl" 
        type="application/pdf"
        width="100%" 
        height="100%" />
    </div>

    <div class="thought-bubble-text">
        <p [innerHTML]="slide.text"></p>
    </div>

    @if (audio) {
        <button 
            class="audio-control-btn" 
            (click)="toggleAudio()">
            @if (!isAudioPaused) {
                <span>⏸️</span>
            } @else {
                <span>▶️</span>
            }
        </button>
    }

    <img
    src="images/tico-lado-derecho.png"
    alt=""
    class="tico-img"
    (click)="toggleAudio()" 
    >

</div>
