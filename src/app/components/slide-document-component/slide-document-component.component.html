<div class="screen" [style.background-image]="slide.backgroundImage ? 'url(' + slide.backgroundImage + ')' : null">

    <div class="document-container">
        <embed 
        [src]="pdfUrl" 
        type="application/pdf"
        width="100%" 
        height="100%" />
    </div>

    <div class="thought-bubble-text">
            <p class="text-white slide-text" [ngClass]="{
        'text-small': (slide.text?.length || 0) > 200,
        'text-medium': (slide.text?.length || 0) > 70 && (slide.text?.length || 0) <= 200,
        'text-large': (slide.text?.length || 0) <= 70
      }">{{ slide.text }}</p>
        </div>

    @if (audio) {
        <button 
            class="audio-control-btn" 
            (click)="toggleAudio()">
            @if (!isAudioPaused) {
                <span>⏸️</span>
            } @else {
                <span>▶️</span>
            }
        </button>
    }

    @if (isAudioPlaying) {
        <img src="https://elhiloazul.com/wp-content/uploads/2026/04/Tico-Izquierda.gif" alt="Personaje" class="tico-img" (click)="toggleAudio()">
    }
    @if (!isAudioPlaying) {
        <img src="https://elhiloazul.com/wp-content/uploads/2026/04/Tico-Der-No-habla.gif" alt="Personaje" class="tico-img" (click)="toggleAudio()">
    }

</div>
