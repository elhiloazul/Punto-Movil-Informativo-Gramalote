<div class="contact-form-container">
  <div class="iframe-container">
    <iframe
      class="form-iframe"
      [src]="trustedUrl"
      title="Formulario de contacto"
      allowfullscreen
    ></iframe>

    <div class="iframe-overlay">
      <p>Este sitio no permite ser mostrado dentro de una aplicación (X-Frame-Options).</p>
      <p>Haz clic en el botón para abrir el formulario en una pestaña nueva.</p>

      <a class="open-external" [href]="formUrl" target="_blank" rel="noreferrer noopener">
        Abrir en nueva pestaña
      </a>
    </div>

    <button class="continue-button" (click)="onContinue()">
      Continuar
    </button>
  </div>
</div>
