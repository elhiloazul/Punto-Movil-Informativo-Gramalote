<div class="screen">

    <div class="game-container">
        <div class="minerals-grid">
            @for (mineral of minerals; track mineral.id) {
                @if (!mineral.found) {
                    <div class="mineral-card" (click)="onMineralSelected(mineral)">
                        <img [src]="mineral.image" />
                    </div>
                }
            }
        </div>
    </div>  

    <div class="thought-bubble-text">
        <p [innerHTML]="text"></p>
    </div>

    @if (isAudioPlaying) {
        <img
        src="images/tico/Tico-Derecha.gif"
        alt=""
        class="tico-img"
        >
    }
    @if (!isAudioPlaying) {
        <img
        src="images/tico/Tico-Izq-No-habla.gif"
        alt=""
        class="tico-img"
        >
    }

</div>
