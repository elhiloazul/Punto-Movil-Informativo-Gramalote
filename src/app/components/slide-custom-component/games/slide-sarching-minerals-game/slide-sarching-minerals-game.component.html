<div class="screen">

    <div class="game-container">
        @for (mineral of minerals; track mineral.id) {
            @if (!mineral.found) {
            <img
                class="mineral"
                [src]="mineral.image"
                [style.left.%]="mineral.x"
                [style.top.%]="mineral.y"
                (click)="onMineralClick(mineral)"
                alt=""
            />
            }
        }

        @if (foundMineral) {
            <div class="found-overlay">
            <div class="found-card">
                <img
                class="found-icon"
                [src]="foundMineral.image"
                alt=""
                />
                <div class="found-text">
                ¡EXCELENTE!
                </div>
            </div>
            </div>
        }
    </div>

    <div class="thought-bubble-text">
        <p [innerHTML]="text"></p>
    </div>

    @if (isAudioPlaying) {
        <img
        src="https://elhiloazul.com/wp-content/uploads/2026/04/Tico-Derecha.gif"
        alt=""
        class="tico-img"
        >
    }
    @if (!isAudioPlaying) {
        <img
        src="https://elhiloazul.com/wp-content/uploads/2026/04/Tico-Izq-No-habla.gif"
        alt=""
        class="tico-img"
        >
    }

</div>
