  <main class="main" [style.background-image]="slide.backgroundImage ? 'url(' + slide.backgroundImage + ')' : null" [style.height]="'100vh'" [style.background-size]="'cover'" [style.background-position]="'center'">
    <div class="content-container">
        <div class="thought-bubble-image">
            <img [src]="slide.imageUrl" alt="">
        </div>

        <div class="thought-bubble-text">
            <p [innerHTML]="slide.text"></p>
        </div>
    </div>

    <img 
        src="images/tico-lado-derecho.png" 
        alt="Personaje" 
        class="tico-img"
        (click)="toggleAudio()"    
    >
</main>
