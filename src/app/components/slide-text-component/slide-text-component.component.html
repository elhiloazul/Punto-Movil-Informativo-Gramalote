<main class="main" [style.background-image]="slide.backgroundImage ? 'url(' + slide.backgroundImage + ')' : null"
  [style.height]="'100vh'" [style.background-size]="'cover'" [style.background-position]="'center'">
  <div class="thought-bubble">
    <p class="text-white slide-text" [ngClass]="{
        'text-small': text.length > 200,
        'text-medium': text.length > 70 && text.length <= 200,
        'text-large': text.length <= 70
      }">{{ text }}</p>
  </div>
    <img src="https://elhiloazul.com/wp-content/uploads/2026/03/Tico-Centro.gif" alt="Personaje" class="personaje" *ngIf="!noAudio" (click)="toggleAudio()">
    <img src="https://elhiloazul.com/wp-content/uploads/2026/03/Tico-Centro-Sin-Audio.gif" alt="Personaje" class="personaje" *ngIf="noAudio" (click)="toggleAudio()">

  @if (!slide.audio) {
  <div class="button-container">
    <button class="next-btn" (click)="completed.emit()">Siguiente</button>
  </div>
  }

</main>
